# ZenvX OS P1 — Hyprland (animated tiling Wayland desktop)
monitor = , preferred, auto, 1

$term = foot
$menu = fuzzel

# --- autostart ---
exec-once = swaybg -c 1a1b26
exec-once = waybar
exec-once = mako
# the always-on ZenvX voice agent, centered
exec-once = [workspace 1] foot --app-id zenvx-agent sh -c 'zenvx; zenvx-tui; exec sh'

env = XCURSOR_SIZE,24

input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
}

general {
    gaps_in = 6
    gaps_out = 14
    border_size = 2
    col.active_border = rgba(7aa2f7ee) rgba(bb9af7ee) 45deg
    col.inactive_border = rgba(414868aa)
    layout = dwindle
}

decoration {
    rounding = 12
    active_opacity = 1.0
    inactive_opacity = 0.94
    blur {
        enabled = true
        size = 6
        passes = 2
        new_optimizations = true
    }
    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(00000066)
    }
}

animations {
    enabled = true
    bezier = ease, 0.25, 0.1, 0.25, 1.0
    bezier = pop, 0.68, -0.55, 0.27, 1.55
    animation = windows, 1, 6, pop, slide
    animation = windowsOut, 1, 6, ease, slide
    animation = fadeIn, 1, 6, ease
    animation = fadeOut, 1, 6, ease
    animation = border, 1, 10, ease
    animation = workspaces, 1, 6, pop, slide
}

dwindle {
    pseudotile = true
    preserve_split = true
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

# --- keybindings ---
$mod = SUPER
bind = $mod, RETURN, exec, $term
bind = $mod, B, exec, firefox
bind = $mod, D, exec, $menu
bind = $mod, SPACE, exec, zenvx-listen     # push-to-talk voice command
bind = $mod, Q, killactive
bind = $mod SHIFT, E, exit
bind = $mod, F, fullscreen
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow
